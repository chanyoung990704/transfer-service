version: '3.8'

services:
  # MySQL: 계좌 및 이벤트 데이터 저장
  mysql:
    image: mysql:8.0
    container_name: transfer-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: transfer_db
      MYSQL_ROOT_PASSWORD: password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  # Redis: 멱등성 키 캐싱
  redis:
    image: redis:latest
    container_name: transfer-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Zookeeper: Kafka 관리를 위한 코디네이터
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: transfer-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Kafka: 이벤트 메시지 브로커
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: transfer-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  # Kafka UI: 브로커 및 토픽 모니터링 (http://localhost:8081)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: transfer-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
