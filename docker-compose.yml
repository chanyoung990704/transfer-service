version: '3.8'

services:
  # MySQL: 데이터 저장
  mysql:
    image: mysql:8.0
    container_name: transfer-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=transfer_db
      - MYSQL_ROOT_PASSWORD=password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  # Redis: 멱등성 및 분산 락
  redis:
    image: redis:latest
    container_name: transfer-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Kafka Infrastructure
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: transfer-zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: transfer-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1

  # Zipkin: Distributed Tracing Dashboard
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: transfer-zipkin
    ports:
      - "9411:9411"

  # Prometheus: Metrics Collector
  prometheus:
    image: prom/prometheus:latest
    container_name: transfer-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana: Visualization Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: transfer-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # NGINX Load Balancer
  nginx:
    image: nginx:latest
    container_name: transfer-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - transfer-app-1
      - transfer-app-2
      - transfer-app-3

  # Application Instances
  transfer-app-1:
    build: .
    container_name: transfer-app-1
    environment:
      - SERVER_PORT=8080
      - INSTANCE_NAME=app-1
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/transfer_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started

  transfer-app-2:
    build: .
    container_name: transfer-app-2
    environment:
      - SERVER_PORT=8080
      - INSTANCE_NAME=app-2
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/transfer_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started

  transfer-app-3:
    build: .
    container_name: transfer-app-3
    environment:
      - SERVER_PORT=8080
      - INSTANCE_NAME=app-3
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/transfer_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
