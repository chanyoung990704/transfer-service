events {
    worker_connections 1024;
}

http {
    upstream transfer-service-cluster {
        server transfer-app-1:8080;
        server transfer-app-2:8080;
        server transfer-app-3:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://transfer-service-cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 에러 발생 시 다른 인스턴스로 즉시 넘김
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        }

        # 모니터링을 위한 Actuator 경로 (선택 사항)
        location /actuator/health {
            proxy_pass http://transfer-service-cluster/actuator/health;
        }
    }
}
