global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'transfer-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['transfer-app-1:8080', 'transfer-app-2:8080', 'transfer-app-3:8080']
        labels:
          application: 'transfer-service'
