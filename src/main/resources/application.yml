server:
  port: ${SERVER_PORT:8080} # 멀티 인스턴스를 위해 환경 변수 사용 가능하게 설정
  shutdown: graceful # 안전한 종료 활성화

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/transfer_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: password
    hikari:
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate.format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: transfer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "dev.chan.transferservice.domain.event"

  lifecycle:
    timeout-per-shutdown-phase: 30s # Graceful Shutdown 대기 시간

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics # 상태 확인용 엔드포인트 노출
  endpoint:
    health:
      show-details: always

transfer:
  idempotency:
    ttl-seconds: 86400

logging:
  pattern:
    console: "[${INSTANCE_NAME:local}] %d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
